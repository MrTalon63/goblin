name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'decoder-gui/**'
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x86_64
          - name: windows-amd64
            os: windows-latest
            platform: windows/amd64
            wails_flags: "-nsis"
            wails_upx: "-upx"
            artifact_name: windows-amd64
            is_linux: false
            is_mac: false

          # Windows ARM64
          - name: windows-arm64
            os: windows-latest
            platform: windows/arm64
            wails_flags: "-nsis"
            wails_upx: "-upx"
            artifact_name: windows-arm64
            is_linux: false
            is_mac: false

          # Linux 22.04 Legacy (Intel)
          - name: linux-legacy-amd64
            os: ubuntu-22.04
            platform: linux/amd64
            wails_flags: ""
            wails_upx: "-upx"
            artifact_name: linux-legacy-amd64
            is_linux: true
            is_mac: false

          # Linux 24.04 (Intel)
          - name: linux-latest-amd64
            os: ubuntu-24.04
            platform: linux/amd64
            wails_flags: "-tags webkit2_41"
            wails_upx: "-upx"
            artifact_name: linux-latest-amd64
            is_linux: true
            is_mac: false

          # Linux 24.04 ARM64
          - name: linux-latest-arm64
            os: ubuntu-24.04-arm
            platform: linux/arm64
            wails_flags: "-tags webkit2_41"
            wails_upx: "-upx"
            artifact_name: linux-latest-arm64
            is_linux: true
            is_mac: false

          # macOS Intel
#          - name: macos-amd64
#            os: macos-13
#            platform: darwin/amd64
#            wails_flags: ""
#            wails_upx: ""
#            artifact_name: macos-amd64
#            is_linux: false
#            is_mac: true

          # macOS ARM64
          - name: macos-arm64
            os: macos-latest
            platform: darwin/arm64
            wails_flags: ""
            wails_upx: ""
            artifact_name: macos-arm64
            is_linux: false
            is_mac: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Install Linux dependencies
      - name: Install Linux Dependencies
        if: ${{ matrix.is_linux }}
        run: |
          sudo apt-get update
          if [ "${{ matrix.os }}" = "ubuntu-22.04" ]; then
            sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential pkg-config upx-ucl
          else
            sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config upx-ucl
          fi

      # Install Windows UPX
      - name: Install UPX (Windows)
        if: ${{ startsWith(matrix.platform, 'windows/') }}
        run: choco install -y upx

      # Install Windows NSIS (required to build installer)
      - name: Install NSIS (Windows)
        if: ${{ startsWith(matrix.platform, 'windows/') }}
        uses: negrutiu/nsis-install@v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.0'
          cache: true
          cache-dependency-path: decoder-gui/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: decoder-gui/frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
        shell: bash

      - name: Build Wails App
        run: |
          cd decoder-gui
          wails build -platform ${{ matrix.platform }} ${{ matrix.wails_flags }} ${{ matrix.wails_upx }}
        shell: bash

      # Windows Packaging
      - name: Prepare Windows Artifacts
        if: ${{ startsWith(matrix.platform, 'windows/') }}
        run: |
          mkdir -p package-dir
          cp decoder-gui/build/bin/decoder-gui.exe package-dir/decoder-gui-${{ matrix.name }}.exe
          cp decoder-gui/build/bin/decoder-gui-installer.exe package-dir/decoder-gui-${{ matrix.name }}-installer.exe
        shell: bash

      # Linux Packaging
      - name: Prepare Linux Artifacts
        if: ${{ matrix.is_linux }}
        run: |
          mkdir -p package-dir
          tar -czf package-dir/decoder-gui-${{ matrix.name }}.tar.gz -C decoder-gui/build/bin decoder-gui

      # macOS Packaging
      - name: Prepare macOS Artifacts
        if: ${{ matrix.is_mac }}
        run: |
          mkdir -p package-dir
          cd decoder-gui/build/bin
          zip -r ../../../package-dir/decoder-gui-${{ matrix.name }}.zip decoder-gui.app
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: package-dir/*

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List files
        run: ls -lh artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'nightly' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Nightly Build' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          body: ${{ startsWith(github.ref, 'refs/tags/') && 'Automated tag release' || format('Nightly build generated from commit {0}', github.sha) }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
