name: Build and Push Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'telemetry-server/**'
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository name for GHCR tag
        id: image-tag
        run: |
          # GHCR requires lowercased image repository names
          IMAGE_ID=$(echo "ghcr.io/${{ github.repository_owner }}/goblin-telemetry-server" | tr '[:upper:]' '[:lower:]')
          
          # Determine version tag
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="latest"
          fi
          
          echo "image_id=$IMAGE_ID" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha_tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./telemetry-server
          file: ./telemetry-server/Dockerfile
          push: true
          tags: |
            ${{ steps.image-tag.outputs.image_id }}:${{ steps.image-tag.outputs.version }}
            ${{ steps.image-tag.outputs.image_id }}:${{ steps.image-tag.outputs.sha_tag }}
            ${{ github.ref == 'refs/heads/master' && format('{0}:nightly', steps.image-tag.outputs.image_id) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
